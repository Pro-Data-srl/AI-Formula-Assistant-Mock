services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: formel-assistent-db
    environment:
      POSTGRES_USER: formel
      POSTGRES_PASSWORD: formel
      POSTGRES_DB: formel_assistent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formel -d formel_assistent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
